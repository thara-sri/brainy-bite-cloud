name: Build and Push to ECR (ARM64)

on:
  push:
    branches: ["main"]
    paths:
      - "brainybite-new/**"
      - .github/workflows/**

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::108782062712:role/github-actions-ecr-role
          aws-region: ap-southeast-7 #

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./brainybite-new
          file: ./brainybite-new/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/brainy-bite/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
